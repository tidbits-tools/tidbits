name: Tidbits
options:
  bundleIdPrefix: tools.tidbits
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

packages:
  NotesCore:
    path: NotesCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.0"

targets:
  Tidbits:
    type: application
    platform: macOS
    sources:
      - path: Notes/Sources
      - path: Notes/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tools.tidbits
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_CODE_SIGN_FLAGS: --timestamp
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: Notes/Info.plist
      properties:
        CFBundleName: Tidbits
        CFBundleDisplayName: Tidbits
        CFBundlePackageType: APPL
        LSApplicationCategoryType: public.app-category.productivity
        LSUIElement: true
        NSAccessibilityUsageDescription: Tidbits needs Accessibility permission to capture selected text with a global keyboard shortcut.
        SUFeedURL: https://raw.githubusercontent.com/tidbits-tools/tidbits/main/appcast.xml
        SUPublicEDKey: $(SPARKLE_ED_PUBLIC_KEY)
        NSServices:
          - NSMenuItem:
              default: Add to Tidbits
            NSMessage: addToTidbitsService
            NSKeyEquivalent:
              default: T
            NSSendTypes:
              - public.rtf
              - public.html
              - public.utf8-plain-text
              - public.plain-text
    dependencies:
      - package: NotesCore
        product: NotesCore
      - package: Sparkle
        product: Sparkle


